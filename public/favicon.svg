<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background: rounded square -->
  <rect x="0" y="0" width="256" height="256" rx="48" ry="48" fill="#141416"/>

  <!-- Camera body: filled for better visibility at small sizes -->
  <rect x="40" y="72" width="176" height="130" rx="20" ry="20" fill="none" stroke="#FFFFFF" stroke-width="18"/>

  <!-- Viewfinder -->
  <rect x="92" y="62" width="72" height="20" rx="10" ry="10" fill="#FFFFFF"/>

  <!-- Lens ring: thicker stroke -->
  <circle cx="128" cy="140" r="46" fill="none" stroke="#FFFFFF" stroke-width="16"/>

  <!-- Lens inner -->
  <circle cx="128" cy="140" r="22" fill="#FFFFFF"/>

  <!-- Flash dot -->
  <circle cx="66" cy="90" r="10" fill="#FFFFFF"/>

  <!-- Inner lens detail -->
  <circle cx="128" cy="140" r="12" fill="#141416"/>
</svg>
